services:
  mariadb:
    container_name: mariadb			
    networks:
      - inception            			
    build: 
      context: mariadb 	
      dockerfile: Dockerfile			
    env_file: .env         
    volumes:                       
      - mariadb:/var/lib/mysql
    restart: on-failure
    expose:                        
        - "3306" 
  nginx:
    container_name: nginx
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    depends_on:        			 
      - wordpress
    build: 
      context: nginx
      dockerfile: Dockerfile
    env_file: .env
    restart: on-failure
    ports:
    - "443:443" 		
  wordpress:
    container_name: wordpress
    env_file: .env
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    build: 
      context: wordpress
      dockerfile: Dockerfile
    depends_on:    					
      - mariadb
    restart: on-failure
    expose: 
    - "9000"

volumes:
  wordpress:
    driver: local 
    driver_opts:
      type: 'none' 								
      o: 'bind'
      device: '/home/$USER/data/wordpress' 		
  mariadb:
    driver: local
    driver_opts:
      type: 'none' 
      o: 'bind'										 
      device: '/home/$USER/data/mariadb'			
networks:
  inception:
    driver: bridge		